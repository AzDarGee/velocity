server {
    listen 80;
    server_name _;

    root /app/dist;
    index index.html;

    # Gzip compression for faster file delivery and optimized bandwidth
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Reverse proxy all API routes to the Express backend
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for music generation and audio conversion routes
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # Serve SPA — all non-file routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Leverage browser caching for raw static media assets
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp|js|css|woff2?|eot|ttf|otf|mp4)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
